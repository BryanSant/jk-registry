# SPDX-License-Identifier: Apache-2.0
#
# jk short-name registry.
#
# Maps a curated short identifier to a Maven `group:artifact` pair. When a
# project's jk.toml references a known short name, jk fills in the
# coordinate automatically — the user only supplies a version:
#
#     [dependencies.main]
#     jackson3-databind = "2.18.2"          # parser resolves via this table
#
# Unknown short names fall back to the structured form
# `{ group = "...", version = "..." }`. Workspace-defined aliases in
# `[workspace.dependencies]` take precedence over this list.
#
# Versions are deliberately NOT pinned here — that's the user's call per
# project. This is a name-to-coordinate index, not a curated catalog.
#
# Curation policy:
#   - Java/Kotlin ecosystem only (matches jk's v1 scope).
#   - One canonical short name per artifact.
#   - When the artifactId is already short and unambiguous (e.g. `picocli`,
#     `guava`), prefer that as the short name.
#   - Spring Boot starter prefix retained (`spring-boot-starter-*`) — it's
#     load-bearing for grep / muscle-memory.
#   - Split aliases by major version when the Maven *coordinate* changes
#     (e.g. Jackson 2 → 3 moved from com.fasterxml.jackson.* to
#     tools.jackson.*). The registry deliberately does NOT pick a default
#     — both `jackson2-databind` and `jackson3-databind` are curated; the
#     unprefixed `jackson-databind` is intentionally absent so a registry
#     adopter never gets a silent major-version bump. Within-coord bumps
#     (Spring Boot 2 vs 3 — same GAV, different version selector) keep
#     one alias.

[aliases]

# ─── Jackson 2 (com.fasterxml.jackson.*) ─────────────────────────────────
