jackson2-module-afterburner          = "com.fasterxml.jackson.module:jackson-module-afterburner"
jackson2-module-blackbird            = "com.fasterxml.jackson.module:jackson-module-blackbird"
jackson2-datatype-jsr310             = "com.fasterxml.jackson.datatype:jackson-datatype-jsr310"
jackson2-datatype-jdk8               = "com.fasterxml.jackson.datatype:jackson-datatype-jdk8"
jackson2-datatype-guava              = "com.fasterxml.jackson.datatype:jackson-datatype-guava"
jackson2-datatype-joda               = "com.fasterxml.jackson.datatype:jackson-datatype-joda"
jackson2-dataformat-yaml             = "com.fasterxml.jackson.dataformat:jackson-dataformat-yaml"
jackson2-dataformat-xml              = "com.fasterxml.jackson.dataformat:jackson-dataformat-xml"
jackson2-dataformat-csv              = "com.fasterxml.jackson.dataformat:jackson-dataformat-csv"
jackson2-dataformat-toml             = "com.fasterxml.jackson.dataformat:jackson-dataformat-toml"
jackson2-dataformat-cbor             = "com.fasterxml.jackson.dataformat:jackson-dataformat-cbor"
